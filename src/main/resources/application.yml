server:
  port: 8080

# Основной источник данных для JPA и Camunda (общая H2)
spring:
  datasource:
    url: jdbc:h2:mem:customs
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/changelog-master.xml
    enabled: true